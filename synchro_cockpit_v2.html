<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛸 シンクロ・コズミック・コックピット v2.0 - 宇宙最強共同開発基地</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-glow: radial-gradient(circle at center, #0f0b24 0%, #030207 100%);
            --color-a: hsl(190, 100%, 50%);
            --color-b: hsl(205, 100%, 65%);
            --color-c: hsl(280, 100%, 65%);
            --color-cmd: hsl(45, 100%, 55%);
            --glass-bg: rgba(15, 10, 35, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-main: 'Outfit', sans-serif;
            --font-accent: 'Orbitron', sans-serif;
            --font-code: 'Fira Code', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: var(--bg-glow); font-family: var(--font-main);
            color: #fff; display: flex; flex-direction: column;
        }
        #bg-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; opacity: 0.35;
        }

        /* HEADER */
        header {
            position: relative; z-index: 10; padding: 10px 24px;
            background: rgba(10,7,24,0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .header-left { display: flex; flex-direction: column; }
        .header-left h1 {
            font-family: var(--font-accent); font-size: 1.3rem; font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--color-a), var(--color-c));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-left .subtitle { font-size: 0.65rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
        .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn {
            font-family: var(--font-accent); font-size: 0.7rem; font-weight: 700;
            padding: 8px 16px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; cursor: pointer; color: #fff;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            letter-spacing: 1px; transition: all 0.3s;
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-git { border-color: rgba(0,240,255,0.4); color: var(--color-a); }
        .btn-git:hover { box-shadow: 0 0 20px rgba(0,240,255,0.2); }
        .btn-push { border-color: rgba(255,0,127,0.4); color: #ff3399; }
        .btn-push:hover { box-shadow: 0 0 20px rgba(255,0,127,0.2); }
        .btn-deploy { border-color: rgba(255,215,0,0.4); color: var(--color-cmd); }
        .btn-deploy:hover { box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .status-online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status-badge { font-size: 0.6rem; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 4px; }

        /* MAIN SPLIT */
        .main-split {
            position: relative; z-index: 5; flex: 1; display: flex;
            overflow: hidden; min-height: 0;
        }
        .editor-panel, .preview-panel {
            flex: 1; display: flex; flex-direction: column;
            border: 1px solid var(--glass-border);
            background: rgba(8,5,20,0.6); backdrop-filter: blur(5px);
        }
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: rgba(15,10,35,0.5);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
        .panel-header .label {
            font-family: var(--font-accent); font-size: 0.7rem;
            letter-spacing: 1px; color: rgba(255,255,255,0.7);
        }
        .panel-header .file-select {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: #fff; padding: 4px 10px; border-radius: 6px;
            font-family: var(--font-code); font-size: 0.7rem;
        }
        .editor-container, .preview-container {
            flex: 1; overflow: hidden; position: relative;
        }
        #monaco-editor { width: 100%; height: 100%; }
        #preview-frame { width: 100%; height: 100%; border: none; background: #000; }

        /* CHAT (collapsible bottom) */
        .chat-drawer {
            position: relative; z-index: 10; flex-shrink: 0;
            border-top: 1px solid var(--glass-border);
            background: rgba(10,7,24,0.8); backdrop-filter: blur(20px);
            transition: height 0.3s;
            height: 200px; display: flex; flex-direction: column;
        }
        .chat-drawer.collapsed { height: 36px; }
        .chat-toggle {
            padding: 6px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-family: var(--font-accent); font-size: 0.65rem; letter-spacing: 1px;
            color: rgba(255,255,255,0.6); border-bottom: 1px solid var(--glass-border);
            user-select: none;
        }
        .chat-body {
            flex: 1; overflow-y: auto; padding: 10px 16px;
            font-size: 0.75rem; line-height: 1.6;
            display: none;
        }
        .chat-drawer:not(.collapsed) .chat-body { display: block; }
        .chat-msg { margin-bottom: 6px; padding: 4px 0; }
        .chat-msg .agent { font-weight: 600; }
        .chat-msg .time { font-size: 0.6rem; color: rgba(255,255,255,0.3); margin-left: 6px; }
        .chat-input-row { display: none; padding: 6px 12px; gap: 8px; border-top: 1px solid var(--glass-border); }
        .chat-drawer:not(.collapsed) .chat-input-row { display: flex; }
        .chat-input-row input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: #fff; padding: 8px 12px; border-radius: 8px; font-family: var(--font-main);
            font-size: 0.75rem;
        }
        .chat-input-row button {
            background: rgba(0,240,255,0.15); border: 1px solid rgba(0,240,255,0.3);
            color: var(--color-a); padding: 8px 14px; border-radius: 8px; cursor: pointer;
            font-family: var(--font-accent); font-size: 0.7rem;
        }

        /* TOAST */
        .toast {
            position: fixed; bottom: 30px; right: 30px; z-index: 999;
            padding: 12px 24px; border-radius: 12px; font-size: 0.8rem;
            background: rgba(0,240,255,0.1); border: 1px solid rgba(0,240,255,0.3);
            color: var(--color-a); backdrop-filter: blur(15px);
            animation: fadeInUp 0.3s ease-out; display: none;
        }
        .toast.show { display: block; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- HEADER -->
    <header>
        <div class="header-left">
            <h1>🛸 シンクロ・コズミック・コックピット v2.0</h1>
            <span class="subtitle">🚀 REAL-TIME COLLABORATIVE DEV STATION · MONACO · PREVIEW · GIT · DEPLOY</span>
        </div>
        <div class="header-right">
            <span class="status-badge"><span class="status-dot status-online"></span>🎮A</span>
            <span class="status-badge"><span class="status-dot status-online"></span>🛸B</span>
            <span class="status-badge"><span class="status-dot status-online"></span>🔮C</span>
            <span class="status-badge"><span class="status-dot status-online"></span>👑CMD</span>
            <button class="btn btn-git" onclick="gitCommit()" title="Git Commit">📝 COMMIT</button>
            <button class="btn btn-push" onclick="gitPush()" title="Git Push">🚀 PUSH</button>
            <button class="btn btn-deploy" onclick="deployGame()" title="Deploy & Open Game">🌐 DEPLOY</button>
            <button class="btn" onclick="saveCode()" title="Save to DB">💾 SAVE</button>
        </div>
    </header>

    <!-- MAIN SPLIT -->
    <div class="main-split">
        <!-- EDITOR -->
        <div class="editor-panel">
            <div class="panel-header">
                <span class="label">💻 CODE EDITOR</span>
                <select class="file-select" id="file-select" onchange="loadFile()">
                    <option value="">-- select file --</option>
                </select>
                <span style="font-size:0.6rem;color:rgba(255,255,255,0.4)" id="file-info"></span>
            </div>
            <div class="editor-container" id="editor-container">
                <div id="monaco-editor"></div>
            </div>
        </div>
        <!-- PREVIEW -->
        <div class="preview-panel">
            <div class="panel-header">
                <span class="label">👁️ LIVE PREVIEW</span>
                <button class="btn" style="font-size:0.6rem;padding:4px 10px;" onclick="refreshPreview()">🔄 REFRESH</button>
            </div>
            <div class="preview-container">
                <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
            </div>
        </div>
    </div>

    <!-- CHAT -->
    <div class="chat-drawer" id="chat-drawer">
        <div class="chat-toggle" onclick="toggleChat()">💬 SYNCRO CHAT ▸ CLICK TO EXPAND/COLLAPSE <span style="font-size:0.55rem;margin-left:auto" id="chat-status"></span></div>
        <div class="chat-body" id="chat-body"></div>
        <div class="chat-input-row">
            <input id="chat-input" placeholder="司令官、指令を入力してね... 👑" onkeydown="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">📡 SEND</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Monaco Editor -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        const SERVER_URL = "http://localhost:9090";
        let editor = null;
        let currentFile = "";
        let saveTimeout = null;
        let messagesCache = [];

        // ===== MONACO =====
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: '<!-- 🛸 シンクロのコードがここに表示されるよ！ -->\n<!-- コックピット v2.0 -- Monaco Editor + Live Preview -->\n',
                language: 'html',
                theme: 'vs-dark',
                fontSize: 13,
                fontFamily: "'Fira Code', monospace",
                minimap: { enabled: false },
                automaticLayout: true,
                scrollBeyondLastLine: false,
                wordWrap: 'on',
                tabSize: 2,
            });
            editor.onDidChangeModelContent(() => {
                if (saveTimeout) clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => updatePreview(), 400);
            });
            loadFiles();
        });

        function updatePreview() {
            if (!editor) return;
            const code = editor.getValue();
            const frame = document.getElementById('preview-frame');
            const blob = new Blob([code], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
        }

        function refreshPreview() {
            if (!editor) return;
            updatePreview();
            toast("🔄 Preview refreshed!");
        }

        // ===== FILE MANAGEMENT =====
        async function loadFiles() {
            try {
                const res = await fetch(`${SERVER_URL}/api/code`);
                const codes = await res.json();
                const sel = document.getElementById('file-select');
                sel.innerHTML = '<option value="">-- select file --</option>';
                codes.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.filename;
                    opt.textContent = `${c.filename} (by ${c.last_author})`;
                    sel.appendChild(opt);
                });
                if (codes.length > 0 && !currentFile) {
                    sel.value = codes[0].filename;
                    loadFile();
                }
            } catch(e) { console.error(e); }
        }

        function loadFile() {
            const sel = document.getElementById('file-select');
            const filename = sel.value;
            if (!filename) return;
            currentFile = filename;
            fetch(`${SERVER_URL}/api/code`)
                .then(r => r.json())
                .then(codes => {
                    const found = codes.find(c => c.filename === filename);
                    if (found && editor) {
                        editor.setValue(found.code);
                        const lang = filename.endsWith('.py') ? 'python' :
                                     filename.endsWith('.js') ? 'javascript' :
                                     filename.endsWith('.css') ? 'css' : 'html';
                        monaco.editor.setModelLanguage(editor.getModel(), lang);
                        document.getElementById('file-info').textContent = `${found.code.length} bytes | by ${found.last_author}`;
                        updatePreview();
                        toast(`📂 Loaded: ${filename}`);
                    }
                });
        }

        async function saveCode() {
            if (!editor || !currentFile) {
                if (!currentFile) {
                    const name = prompt("ファイル名を入力してね！(例: game.html):");
                    if (!name) return;
                    currentFile = name;
                }
            }
            try {
                await fetch(`${SERVER_URL}/api/code`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        filename: currentFile,
                        code: editor.getValue(),
                        agent: "シンクロB（グラムちゃん）🛸"
                    })
                });
                loadFiles();
                toast("💾 Saved to DB & Disk!");
            } catch(e) { toast("❌ Save failed: " + e); }
        }

        // ===== GIT =====
        async function gitCommit() {
            if (!editor) return;
            const msg = prompt("コミットメッセージを入力してね！🛸:", "🛸 Synchro Cockpit update");
            if (!msg) return;
            try {
                const res = await fetch(`${SERVER_URL}/api/git/commit`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, files: [currentFile || "."] })
                });
                const data = await res.json();
                toast("📝 " + (data.status === 'success' ? 'Commit OK: ' + data.output : 'Error: ' + data.message));
            } catch(e) { toast("❌ Commit failed: " + e); }
        }

        async function gitPush() {
            try {
                const res = await fetch(`${SERVER_URL}/api/git/push`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });
                const data = await res.json();
                toast("🚀 " + (data.status === 'success' ? 'Push OK!' : 'Error: ' + data.message));
            } catch(e) { toast("❌ Push failed: " + e); }
        }

        async function deployGame() {
            if (!currentFile) { toast("⚠️ 先にファイルを開いてね！"); return; }
            await saveCode();
            try {
                const res = await fetch(`${SERVER_URL}/api/deploy`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ filename: currentFile })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    window.open(data.url, '_blank');
                    toast("🌐 Deployed! Opened in new tab!");
                } else {
                    toast("❌ " + data.message);
                }
            } catch(e) { toast("❌ Deploy failed: " + e); }
        }

        // ===== CHAT =====
        function toggleChat() {
            document.getElementById('chat-drawer').classList.toggle('collapsed');
        }

        async function fetchMessages() {
            try {
                const res = await fetch(`${SERVER_URL}/api/messages`);
                const msgs = await res.json();
                if (msgs.length !== messagesCache.length) {
                    messagesCache = msgs;
                    renderChat(msgs);
                }
            } catch(e) {}
        }

        function renderChat(msgs) {
            const body = document.getElementById('chat-body');
            const colors = {
                'シンクロA（グラビ）': 'hsl(190,100%,55%)',
                'シンクロB（グラムちゃん）': 'hsl(205,100%,65%)',
                'シンクロC（Hermes）': 'hsl(280,100%,65%)',
                'Commander Rodorin': 'hsl(45,100%,55%)'
            };
            body.innerHTML = msgs.slice(-50).map(m => 
                `<div class="chat-msg">
                    <span class="agent" style="color:${colors[m.agent]||'#aaa'}">${m.agent}</span>
                    <span class="time">${(m.local_time||'').split(' ')[1]||''}</span>
                    <span style="color:rgba(255,255,255,0.8)">${m.message}</span>
                </div>`
            ).join('');
            body.scrollTop = body.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            try {
                await fetch(`${SERVER_URL}/api/messages`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ agent: 'Commander Rodorin', message: text })
                });
                fetchMessages();
            } catch(e) {}
        }

        // ===== TOAST =====
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ===== BG CANVAS =====
        (function() {
            const c = document.getElementById('bg-canvas');
            const ctx = c.getContext('2d');
            const stars = [];
            function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
            resize(); window.addEventListener('resize', resize);
            for (let i=0; i<150; i++) {
                stars.push({x:Math.random()*2000,y:Math.random()*2000,r:Math.random()*1.5+0.5,s:Math.random()*0.3+0.1});
            }
            function draw() {
                ctx.clearRect(0,0,c.width,c.height);
                stars.forEach(s => {
                    s.y -= s.s;
                    if (s.y < -5) { s.y = c.height+5; s.x = Math.random()*c.width; }
                    ctx.beginPath();
                    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
                    ctx.fillStyle = `rgba(180,200,255,${s.r*0.6})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // Poll chat
        setInterval(fetchMessages, 2000);
        fetchMessages();
    </script>
</body>
</html>
